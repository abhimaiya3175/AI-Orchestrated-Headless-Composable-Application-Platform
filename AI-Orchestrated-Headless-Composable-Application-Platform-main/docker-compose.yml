version: '3.8'

services:
  gateway:
    build: 
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - FLIGHTS_SERVICE_URL=http://flights-service:8001
      - HOTELS_SERVICE_URL=http://hotels-service:8002
      - WEATHER_SERVICE_URL=http://weather-service:8003
      - PLACES_SERVICE_URL=http://places-service:8004
      - BUDGET_SERVICE_URL=http://budget-service:8005
      - LLM_PROVIDER=local
      - LLM_MODEL=llama2
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - flights-service
      - hotels-service
      - weather-service
      - places-service
      - budget-service

  flights-service:
    build:
      context: .
      dockerfile: services/flight_service/Dockerfile
    ports:
      - "8001:8001"

  hotels-service:
    build:
      context: .
      dockerfile: services/hotel_service/Dockerfile
    ports:
      - "8002:8002"

  weather-service:
    build:
      context: .
      dockerfile: services/weather_service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}

  places-service:
    build:
      context: .
      dockerfile: services/places_service/Dockerfile
    ports:
      - "8004:8004"

  budget-service:
    build:
      context: .
      dockerfile: services/budget_service/Dockerfile
    ports:
      - "8005:8005"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - gateway
