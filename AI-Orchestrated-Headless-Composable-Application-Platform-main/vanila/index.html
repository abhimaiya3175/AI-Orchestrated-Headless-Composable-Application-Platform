<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Orchestrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar to match your dark theme */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Smooth fade-in animation for messages */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-anim {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>

<body class="bg-slate-950 text-slate-200 font-sans h-screen flex flex-col p-4 md:p-8">

    <div
        class="max-w-4xl mx-auto w-full flex flex-col h-full bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden">

        <header class="flex justify-between items-center p-6 border-b border-slate-800 bg-slate-900 z-10">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                🤖 TravelAI Planner
            </h1>
            <div class="flex items-center gap-2 text-sm text-slate-400">
                <span id="status-dot" class="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span id="status-text">Checking Backend...</span>
            </div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-6 bg-slate-950">
            <div class="flex justify-start message-anim">
                <div class="bg-slate-800 border border-slate-700 max-w-[85%] rounded-2xl p-4 shadow-md">
                    Hello! I'm your AI Travel Planner. Tell me where you want to go, your budget, and how many days —
                    I'll handle the rest. ✨
                </div>
            </div>
        </div>

        <div class="p-6 bg-slate-900 border-t border-slate-800">
            <div class="relative">
                <input type="text" id="user-input"
                    class="w-full bg-slate-950 border border-slate-700 rounded-xl py-4 pl-4 pr-24 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-slate-200 placeholder-slate-500 shadow-inner"
                    placeholder="e.g. Plan a 3-day trip to Goa under ₹15000">
                <button id="send-btn"
                    class="absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 text-white px-5 py-2 rounded-lg transition-colors font-medium shadow-md">
                    Send
                </button>
            </div>

            <div class="flex gap-2 overflow-x-auto mt-4 pb-1">
                <button
                    class="quick-chip bg-slate-800 hover:bg-slate-700 text-sm py-1.5 px-3 rounded-full border border-slate-700 whitespace-nowrap transition-colors"
                    data-query="Plan a 3-day trip to Goa under ₹15000">🏖️ Goa 3 days ₹15k</button>
                <button
                    class="quick-chip bg-slate-800 hover:bg-slate-700 text-sm py-1.5 px-3 rounded-full border border-slate-700 whitespace-nowrap transition-colors"
                    data-query="Plan a 4-day trip to Manali under ₹20000">🏔️ Manali 4 days ₹20k</button>
                <button
                    class="quick-chip bg-slate-800 hover:bg-slate-700 text-sm py-1.5 px-3 rounded-full border border-slate-700 whitespace-nowrap transition-colors"
                    data-query="What is the weather in Delhi today?">🌤️ Weather in Delhi</button>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
